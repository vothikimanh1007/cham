<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chạm - Zalo Mini App Demo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Giả lập khung màn hình điện thoại */
        .mobile-container {
            width: 375px;
            height: 812px;
            background-color: #ffffff;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
            border: 8px solid #2c3e50;
        }

        /* Header App */
        .header {
            background: linear-gradient(135deg, #0ea5e9, #10b981);
            color: white;
            padding: 40px 20px 20px 20px;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .app-name {
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-info {
            font-size: 14px;
            opacity: 0.9;
        }

        /* Content Area */
        .content {
            padding: 20px;
            height: calc(100% - 220px);
            overflow-y: auto;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .step-badge {
            background-color: #e0f2fe;
            color: #0369a1;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: 700;
        }

        /* Grid học sinh */
        .student-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .student-card {
            background-color: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .student-card.active {
            border-color: #0ea5e9;
            background-color: #f0f9ff;
        }

        .student-avatar {
            width: 40px;
            height: 40px;
            background-color: #cbd5e1;
            border-radius: 50%;
            margin: 0 auto 8px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }

        .student-name {
            font-size: 12px;
            font-weight: 600;
            color: #475569;
        }

        /* Grid PECS / Hành vi */
        .behavior-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 25px;
        }

        .behavior-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            background-color: white;
        }

        .behavior-item.active {
            border-color: #10b981;
            background-color: #ecfdf5;
        }

        .behavior-icon {
            font-size: 24px;
        }

        .behavior-text {
            font-size: 14px;
            color: #334155;
            font-weight: 600;
        }

        /* Nút gửi đồng bộ */
        .sync-btn {
            background: linear-gradient(135deg, #0ea5e9, #10b981);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
            margin-top: 10px;
        }

        /* Thanh điều hướng dưới cùng */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 70px;
            background-color: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 15px; /* Cho tai thỏ iPhone */
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #94a3b8;
            font-size: 11px;
            font-weight: 600;
        }

        .nav-item.active {
            color: #0ea5e9;
        }

        .nav-icon {
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="mobile-container">
    <!-- Header -->
    <div class="header">
        <div class="header-top">
            <div class="app-name">✨ Chạm</div>
            <div class="user-info">🔔 Zalo Mini App</div>
        </div>
        <div style="font-size: 24px; font-weight: 700; margin-bottom: 4px;">Lớp Mầm Non 1</div>
        <div style="font-size: 14px; opacity: 0.9;">Cô giáo: Nguyễn Thị A</div>
    </div>

    <!-- Content Area -->
    <div class="content">
        <!-- Bước 1 -->
        <div class="section-title">
            <span>Chọn học sinh</span>
            <span class="step-badge">Click 1</span>
        </div>
        <div class="student-grid">
            <div class="student-card active">
                <div class="student-avatar">👦🏻</div>
                <div class="student-name">Bé Tít</div>
            </div>
            <div class="student-card">
                <div class="student-avatar">👧🏻</div>
                <div class="student-name">Bé Bông</div>
            </div>
            <div class="student-card">
                <div class="student-avatar">👦🏽</div>
                <div class="student-name">Bé Gấu</div>
            </div>
        </div>

        <!-- Bước 2 -->
        <div class="section-title">
            <span>Ghi nhận PECS / Hành vi</span>
            <span class="step-badge">Click 2</span>
        </div>
        <div class="behavior-list">
            <div class="behavior-item active">
                <div class="behavior-icon">🚰</div>
                <div class="behavior-text">Thẻ PECS: Cần uống nước</div>
            </div>
            <div class="behavior-item">
                <div class="behavior-icon">🧘‍♂️</div>
                <div class="behavior-text">Chuyển vào Góc Bình Tĩnh</div>
            </div>
            <div class="behavior-item">
                <div class="behavior-icon">⚡</div>
                <div class="behavior-text">Quá tải cảm giác (Sensory)</div>
            </div>
        </div>

        <!-- Bước 3 -->
        <div class="section-title" style="margin-top: 10px;">
            <span>Đồng bộ phụ huynh</span>
            <span class="step-badge">Click 3</span>
        </div>
        <button class="sync-btn">
            <span>📲 Gửi thông báo qua Zalo ZNS</span>
        </button>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item active">
            <div class="nav-icon">🏠</div>
            <span>Trang chủ</span>
        </div>
        <div class="nav-item">
            <div class="nav-icon">📊</div>
            <span>Báo cáo</span>
        </div>
        <div class="nav-item">
            <div class="nav-icon">⚙️</div>
            <span>Cài đặt</span>
        </div>
    </div>
</div>

</body>
</html>
